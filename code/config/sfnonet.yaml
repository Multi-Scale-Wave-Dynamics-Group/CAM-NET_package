    space_weather_stds_path: "/glade/derecho/scratch/jiahuih/Data/whole/stats/global_stds.npy"
    finetune: !!bool False
    tracer_finetune: !!bool True
    predict_delta: !!bool True
    resuming: True
    # logging options
    log_to_screen: !!bool True
    log_to_wandb: !!bool False
    log_video: 1 # if > 0 will log every i-th epoch
    save_checkpoint: "legacy"

    optimizer_type: "AdamW"
    optimizer_beta1: 0.9
    optimizer_beta2: 0.95
    optimizer_max_grad_norm: 32
    crop_size_x: None
    crop_size_y: None

    # required for validation and scoring
    inf_data_path: "${base_dir}/${dataset_name}/out_of_sample"
    tracer_inf_data_path: "${base_dir}/tracer/out_of_sample"

    # Weights and biases configuration
    wandb_name: None # If None, wandb will assign a random name, recommended
    wandb_group: "sfnonet development" # If None, will be "era5_wind" + config, but you can override it here
    wandb_project: "sfno architecture validation"
    wandb_entity: "sfno-large-model-training"

###########################################################################################################################
# 73 channels + Q base
###########################################################################################################################

# 1 GPUS, h=1, no cuda graphs

base_73chq: &BASELINE_73CHQ
    <<: *BASE_CONFIG

base_73chq_finetune: &BASELINE_73CHQ_FINETUNE
    <<: *BASELINE_73CHQ
    finetune: !!bool True
    lr: 1E-6
    scheduler: "CosineAnnealingLR"
    max_epochs: 3
    scheduler_T_max: 20

# current best single GPU model
sfno_linear_73chq_sc3_layers8_edim384_wstgl2:
    <<: *BASELINE_73CHQ
    wandb_group: "sfno_linear_73chq_sc3_layers8_edim384_wstgl2"

    embed_dim: 384
    num_layers: 8
    scale_factor: 3
    hard_thresholding_fraction: 1.0

    loss: "weighted absolute squared geometric l2"

    channel_weights: "auto"

sfno_linear_73chq_sc3_layers8_edim384_asgl2:
    <<: *BASELINE_73CHQ
    wandb_group: "sfno_linear_73chq_sc3_layers8_edim384_asgl2"

    # log_weights_and_grads: 10

    embed_dim: 384
    num_layers: 8
    scale_factor: 3
    hard_thresholding_fraction: 1.0

    optimizer_type: "Adam"

    loss: "absolute squared geometric l2"


###########################################################################################################################
# Tracer-coupled configuration
###########################################################################################################################

base_tracer: &BASE_TRACER
  <<: *BASE_CONFIG
  nettype: "/glade/campaign/univ/uerf0005/modulus-makani/makani/models/networks/tracer_sfno.py:CAMNetWithTracer"
  tracerset_name: "whole" # "whole" for run 01 UI channels, "tracer" for run 02 O channels
  # Tracer-specific parameters
  tracer_input_channels: 3
  tracer_output_channels: 3
  tracer_history_mode: "none"
  tracer_history_decay: 0.5

  physical_embed_dim: 384
  tracer_embed_dim: 384

  # Training adjustments
  batch_size: 4
  lr: 0.00001
  loss: "weighted absolute squared geometric l2"
  channel_weights: "auto"
  max_epochs: 15

  # Required runtime flags
  enable_synthetic_data: false
  enable_odirect: false
  enable_benchy: false
  save_checkpoint: "legacy"
  

