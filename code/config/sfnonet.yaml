    # architecture related 
    nettype: "SFNO"
    model_grid_type: "equiangular"
    sht_grid_type: "legendre-gauss"
    filter_type: "linear"
    scale_factor: 3
    embed_dim: 384
    num_layers: 8
    complex_activation: "real"
    normalization_layer: "none"
    hard_thresholding_fraction: 1.0
    use_mlp: !!bool True
    mlp_mode: "serial"
    mlp_ratio: 2
    separable: !!bool False
    operator_type: "dhconv"
    activation_function: "gelu"
    pos_embed: "none" # "none", "direct" or "frequency". For resoltuion invariance, use add_grid instead or use "frequency"

    # training parameters
    loss: "absolute squared geometric l2"
    channel_weights: "auto"
    lr:  0.00025 #0.00025
    n_eval_samples: 8760
    max_epochs: 3
    batch_size: 16
    weight_decay: 0.0

    # scheduler parameters
    scheduler: "ReduceLROnPlateau" # "StepLR" # "ReduceLROnPlateau" or "CosineAnnealingLR"
    scheduler_T_max: 70         #used for CosineAnnealingLR
    scheduler_factor: 0.1
    scheduler_patience: 400     #used for reduceLRonplateauuu78i
    scheduler_min_lr: 1e-7       # optional floor

    scheduler_step_size: 100 #used for StepLR
    scheduler_gamma: 0.5 #used for StepLR
    lr_warmup_steps: 0 #used for StepLR


    # general
    verbose: !!bool False

    # wireup stuff
    wireup_info: "mpi"
    wireup_store: "tcp"

    num_data_workers: 2
    num_visualization_workers: 2
    dt: 1 # how many timesteps ahead the model will predict
    n_history: 2 # how many previous timesteps to consider
    prediction_type: "iterative"
    prediction_length: 35 # applicable only if prediction_type == "iterative"
    n_initial_conditions: 5 # applicable only if prediction_type == "iterative"
    valid_autoreg_steps: 19 # number of autoregressive steps for validation, 20 steps in total

    # we make the "epochs" shorter so we have more reporting
    n_train_samples_per_epoch: 37968

    ics_type: "specify_number"
    save_raw_forecasts: !!bool True
    save_channel: !!bool False
    masked_acc: !!bool False
    maskpath: None
    perturb: !!bool False
    add_noise: !!bool False
    noise_std: 0.

    target: "default" # options default, residual
    normalize_residual: false


    normalization: "zscore" # options zscore or minmax or none

    # extra channels
    add_grid: !!bool True
    gridtype: "sinusoidal"
    grid_num_frequencies: 16
    roll: !!bool False
    add_zenith: !!bool True
    # invariants
    add_orography: !!bool True
    orography_path: "${base_dir}/physical/invariants/orography.nc"
    add_landmask: !!bool True
    landmask_path: "${base_dir}/physical/invariants/landsurf.nc"
    add_f107: !!bool False
    add_ap: !!bool False
    add_kp: !!bool False
